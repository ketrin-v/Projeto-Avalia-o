<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudoAtivo · portal de matérias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem 1.5rem 0 1.5rem;
        }

        /* ----- BARRA DE PESQUISA (1/3) ----- */
        .search-section {
            width: 100%;
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            width: 33.333%;           /* exatamente 1/3 da largura disponível */
            min-width: 240px;          /* não fica muito pequeno em telas estreitas */
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 48px;       /* retangular com pontas suaves */
            display: flex;
            align-items: center;
            padding: 0.6rem 1rem;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .search-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }

        .search-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1rem;
            padding: 0.2rem 0;
            background: transparent;
        }

        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 300;
        }

        .lupa {
            margin-right: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
        }

        /* desenho vetorial da lupa (ícone simples com CSS) */
        .lupa-svg {
            width: 20px;
            height: 20px;
            border: 2.5px solid currentColor;
            border-radius: 50%;
            position: relative;
            background: transparent;
        }

        .lupa-svg::after {
            content: '';
            position: absolute;
            bottom: -5px;
            right: -6px;
            width: 7px;
            height: 2.5px;
            background-color: currentColor;
            transform: rotate(45deg);
            border-radius: 2px;
        }

        /* ----- LINHA "TUDO" COM INTERAÇÃO (QUADRADO AO CLICAR) ----- */
        .tudo-linha {
            margin: 1.2rem 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .palavra-tudo {
            display: inline-block;
            cursor: pointer;
            color: #0f172a;
            transition: all 0.1s ease;
            user-select: none;
            padding: 0 0.2rem;
        }

        /* classe ativada via JS para simular o quadrado ao redor da palavra */
        .highlight-tudo {
            outline: 3px solid #2563eb;
            outline-offset: 4px;
            background-color: #eff6ff;
            border-radius: 2px;
        }

        /* ----- GRADE DE MATÉRIAS (quadrados) ----- */
        .materias-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.5rem;
            margin: 2.5rem 0 3rem 0;
        }

        .card-materia {
            background-color: white;
            border-radius: 18px;
            padding: 1.8rem 0.5rem;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;        /* garante formato quadrado */
            word-break: break-word;
            line-height: 1.3;
        }

        .card-materia:hover {
            transform: scale(1.02);
            border-color: #94a3b8;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.15);
        }

        .card-materia:active {
            transform: scale(0.98);
        }

        /* ----- LINHA PRETA (até o fim) ----- */
        .linha-preta {
            width: 100vw;               /* força largura total viewport */
            height: 4px;
            background-color: #0a0a0a;
            margin-top: 2rem;
            border: none;
            margin-left: calc(-50vw + 50%);  /* truque para compensar padding do container */
        }

        /* responsividade fina */
        @media (max-width: 640px) {
            .search-wrapper {
                width: 100%;            /* em telas pequenas ocupa toda largura disponível */
            }
            .materias-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* pequeno ajuste para o contêiner não esconder a linha preta */
        body {
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- BARRA DE PESQUISA 1/3 COM LUPA DESENHADA -->
        <div class="search-section">
            <div class="search-wrapper">
                <span class="lupa" aria-hidden="true">
                    <span class="lupa-svg"></span>
                </span>
                <input type="text" placeholder="Pesquisar matéria ou conteúdo..." aria-label="Campo de pesquisa">
            </div>
        </div>

        <!-- LINHA "TUDO" (ao clicar, quadrado em volta) -->
        <div class="tudo-linha">
            <span class="palavra-tudo" id="palavraTudo">tudo</span>
        </div>

        <!-- GRADE DE QUADRADOS (MATÉRIAS) -->
        <div class="materias-grid" id="gradeMaterias">
            <!-- os dados serão preenchidos via JavaScript para abrir páginas dinâmicas -->
        </div>
    </div>

    <!-- LINHA PRETA QUE VAI ATÉ O FINAL DA PÁGINA (fora do container) -->
    <div class="linha-preta" aria-hidden="true"></div>

    <script>
        (function() {
            // Lista das matérias (exatamente como pedido)
            const materias = [
                "geografia",
                "história",
                "arte",
                "matemática",
                "língua inglesa",
                "educação física",
                "biologia",
                "química",
                "língua portuguesa"
            ];

            // 1) CONSTRUIR OS QUADRADOS NO GRID
            const grade = document.getElementById('gradeMaterias');
            if (grade) {
                materias.forEach(materia => {
                    const card = document.createElement('div');
                    card.className = 'card-materia';
                    card.textContent = materia;

                    // ao clicar no card → abre nova página com os conteúdos da matéria
                    card.addEventListener('click', function(e) {
                        e.stopPropagation();   // evitar conflitos
                        // Cria uma página simples de exemplo (poderia ser um link real)
                        // Usamos encodeURIComponent para evitar problemas com espaços e caracteres
                        const materiaClean = materia.toLowerCase().replace(/\s+/g, '-');
                        // Simulação de abertura de página: nova aba com uma página construída dinamicamente (conteúdo ilustrativo)
                        const novaJanela = window.open('', '_blank');
                        if (novaJanela) {
                            // Escrevemos um HTML básico com o nome da matéria e conteúdos genéricos
                            novaJanela.document.write(`
                                <!DOCTYPE html>
                                <html lang="pt">
                                <head>
                                    <meta charset="UTF-8">
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <title>${materia} · conteúdos</title>
                                    <style>
                                        body { font-family: system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
                                        .card { background: white; max-width: 700px; margin: 0 auto; border-radius: 32px; padding: 2rem; box-shadow: 0 20px 30px -12px #00000020; }
                                        h1 { border-bottom: 3px solid #3b82f6; padding-bottom: 0.5rem; color: #0f172a; }
                                        ul { margin-top: 2rem; list-style: none; padding: 0; }
                                        li { background: #f8fafc; margin: 0.7rem 0; padding: 0.8rem 1.2rem; border-radius: 60px; font-size: 1.2rem; border: 1px solid #cbd5e1; }
                                        .voltar { display: inline-block; margin-top: 2rem; padding: 0.5rem 1.8rem; background: #1e293b; color: white; border-radius: 40px; text-decoration: none; }
                                    </style>
                                </head>
                                <body>
                                    <div class="card">
                                        <h1>📘 ${materia}</h1>
                                        <p><strong>Conteúdos disponíveis:</strong></p>
                                        <ul>
                                            <li>📌 Introdução à ${materia}</li>
                                            <li>📌 Conceitos fundamentais</li>
                                            <li>📌 Exercícios resolvidos</li>
                                            <li>📌 Material de apoio (PDF)</li>
                                            <li>📌 Videoaulas recomendadas</li>
                                        </ul>
                                        <a href="#" onclick="window.close()" class="voltar">⏎ fechar</a>
                                    </div>
                                    <script>document.title = '${materia} — conteúdos';<\\/script>
                                </body>
                                </html>
                            `);
                            novaJanela.document.close();
                        } else {
                            alert('Permita pop-ups para ver a página da matéria.');
                        }
                    });

                    grade.appendChild(card);
                });
            }

            // 2) INTERAÇÃO "TUDO" – ao clicar, adiciona/remove quadrado em volta
            const palavraTudo = document.getElementById('palavraTudo');
            if (palavraTudo) {
                palavraTudo.addEventListener('click', function() {
                    // alterna a classe que desenha o quadrado
                    this.classList.toggle('highlight-tudo');

                    // (opcional) remove após um tempo se quiser, mas mantemos o toggle.
                    // Se quiser que suma sozinho após alguns segundos, descomente abaixo:
                    // setTimeout(() => {
                    //     this.classList.remove('highlight-tudo');
                    // }, 2000);
                });
            }

            // 3) bônus: ao digitar na pesquisa, nada especial (só UI)
        })();
    </script>

    <!-- Nota: linha preta já está fora do container, se estende até os limites da página -->
</body>
</html>
