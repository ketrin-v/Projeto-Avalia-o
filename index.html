<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudoAtivo · portal de matérias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden;
        }

        /* Container agora ocupa 100% da largura sem margens laterais */
        .container {
            width: 100%;
            max-width: 100%;             /* remove a limitação de 1200px */
            padding: 2rem 2rem 0 2rem;   /* padding lateral reduzido para aproveitar espaço */
        }

        /* ----- BARRA DE PESQUISA (100% largura, pontas quadradas, lupa à direita) ----- */
        .search-section {
            width: 100%;
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            width: 100%;                /* ocupa toda a extensão horizontal */
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 0;            /* pontas completamente quadradas */
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            flex-direction: row-reverse;  /* inverte a ordem: lupa vai para a direita */
        }

        .search-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }

        .search-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 0.2rem 0;
            background: transparent;
        }

        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 300;
        }

        .lupa {
            margin-left: 1rem;           /* espaço entre a lupa e o texto (agora à esquerda da lupa) */
            margin-right: 0;              /* remove margem direita */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .lupa:hover {
            opacity: 0.7;
        }

        /* desenho vetorial da lupa (ícone simples com CSS) */
        .lupa-svg {
            width: 22px;
            height: 22px;
            border: 2.5px solid currentColor;
            border-radius: 50%;
            position: relative;
            background: transparent;
        }

        .lupa-svg::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: -7px;
            width: 8px;
            height: 2.5px;
            background-color: currentColor;
            transform: rotate(45deg);
            border-radius: 1px;
        }

        /* ----- LINHA "TUDO" E "IMAGEM" COM INTERAÇÃO (QUADRADO AO CLICAR) ----- */
        .tudo-linha {
            margin: 1.2rem 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 1.5rem;                /* espaço entre as palavras */
            flex-wrap: wrap;
        }

        .palavra-interativa {
            display: inline-block;
            cursor: pointer;
            color: #0f172a;
            transition: all 0.1s ease;
            user-select: none;
            padding: 0 0.2rem;
        }

        /* classe ativada via JS para simular o quadrado ao redor das palavras */
        .highlight-palavra {
            outline: 3px solid #2563eb;
            outline-offset: 4px;
            background-color: #eff6ff;
            border-radius: 0;            /* quadrado sem arredondamento */
        }

        /* ----- GRADE DE MATÉRIAS (3x3) AGORA MAIS LARGA ----- */
        .materias-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);  /* exatamente 3 colunas */
            gap: 1.5rem;
            margin: 2.5rem 0 0 0;
            width: 100%;
        }

        .card-materia {
            background-color: white;
            border-radius: 0;            /* quadrados sem bordas arredondadas */
            padding: 3rem 0.5rem;         /* padding vertical aumentado para melhor proporção */
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;        /* garante formato quadrado */
            word-break: break-word;
            line-height: 1.3;
            gap: 0.8rem;
        }

        /* Estilo específico para o card de geografia com imagem */
        .card-materia.geografia-card {
            padding: 1rem 0.5rem;
        }

        .mapa-imagem {
            width: 80%;
            height: auto;
            max-height: 60%;
            object-fit: contain;
            border-radius: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card-materia.geografia-card:hover .mapa-imagem {
            transform: scale(1.05);
        }

        .card-materia .materia-texto {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
        }

        .card-materia:hover {
            transform: scale(1.02);
            border-color: #94a3b8;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.15);
        }

        .card-materia:active {
            transform: scale(0.98);
        }

        /* Classe para esconder os cards que não correspondem à pesquisa */
        .card-materia.hidden {
            display: none;
        }

        /* Classe para esconder todos os cards (modo imagem) */
        .modo-imagem .card-materia {
            display: none;
        }

        /* Classe para esconder a faixa preta no modo imagem */
        .modo-imagem .faixa-preta-full {
            display: none;
        }

        /* Mensagem quando nenhum resultado é encontrado */
        .nenhum-resultado {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #64748b;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            grid-column: 1 / -1;
            margin: 2rem 0;
        }

        /* Espaçador de 1cm abaixo dos quadros */
        .espacador-1cm {
            height: 37.8px;              /* 1cm aproximado */
            width: 100%;
            background-color: transparent;
        }

        /* ----- FAIXA PRETA EM TODA A EXTENSÃO HORIZONTAL DA PÁGINA (TODA LARGURA) ----- */
        .faixa-preta-full {
            width: 100%;                 /* largura total do elemento pai (body) */
            background-color: #0a0a0a;
            height: 189px;               /* 5cm aproximado */
            margin: 0;
            padding: 0;
            position: relative;
            left: 0;
            right: 0;
            z-index: 1;
        }

        /* Garantir que o body ocupe 100% da largura */
        body {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        /* Ajuste para o conteúdo após a faixa preta */
        .apos-faixa {
            width: 100%;
            height: 1rem;
            background-color: transparent;
        }

        /* responsividade para telas menores */
        @media (max-width: 768px) {
            .materias-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .mapa-imagem {
                width: 70%;
            }
        }

        @media (max-width: 480px) {
            .materias-grid {
                grid-template-columns: 1fr;
            }
            .mapa-imagem {
                width: 60%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- BARRA DE PESQUISA 100% COM LUPA À DIREITA -->
        <div class="search-section">
            <div class="search-wrapper">
                <span class="lupa" aria-hidden="true" id="botaoPesquisa">
                    <span class="lupa-svg"></span>
                </span>
                <input type="text" id="campoPesquisa" placeholder="Pesquisar matéria ou conteúdo..." aria-label="Campo de pesquisa">
            </div>
        </div>

        <!-- LINHA "TUDO" E "IMAGEM" (ao clicar, quadrado em volta) -->
        <div class="tudo-linha">
            <span class="palavra-interativa" id="palavraTudo">tudo</span>
            <span class="palavra-interativa" id="palavraImagem">imagem</span>
        </div>

        <!-- GRADE DE QUADRADOS (MATÉRIAS) - 3x3 -->
        <div class="materias-grid" id="gradeMaterias">
            <!-- os dados serão preenchidos via JavaScript -->
        </div>

        <!-- ESPAÇADOR DE 1CM ABAIXO DOS QUADROS -->
        <div class="espacador-1cm"></div>
    </div>

    <!-- FAIXA PRETA OCUPANDO TODA A EXTENSÃO HORIZONTAL DA PÁGINA -->
    <div class="faixa-preta-full">
        <div class="faixa-preta"></div>
    </div>

    <!-- PEQUENO ESPAÇO APÓS A FAIXA PRETA -->
    <div class="apos-faixa"></div>

    <script>
        (function() {
            // Lista das matérias (exatamente como pedido)
            const materias = [
                { nome: "geografia", temImagem: true },
                { nome: "história", temImagem: false },
                { nome: "arte", temImagem: false },
                { nome: "matemática", temImagem: false },
                { nome: "língua inglesa", temImagem: false },
                { nome: "educação física", temImagem: false },
                { nome: "biologia", temImagem: false },
                { nome: "química", temImagem: false },
                { nome: "língua portuguesa", temImagem: false }
            ];

            let cards = []; // Array para armazenar os cards criados
            let modoImagemAtivo = false; // Variável para controlar o modo imagem

            // URL da imagem de mapa colorido (SVG colorido com mapa-múndi estilizado)
            const mapaImagemUrl = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%23a5d8ff'/%3E%3Cpath d='M150,120 L180,100 L210,120 L230,110 L260,130 L280,120 L310,140 L340,130 L370,150 L400,140 L430,150 L460,140 L490,160 L520,150 L550,170 L580,160 L610,180 L640,170 L670,190 L700,180 L730,200 L760,190 L780,210 L750,230 L720,220 L690,240 L660,230 L630,250 L600,240 L570,260 L540,250 L510,270 L480,260 L450,280 L420,270 L390,290 L360,280 L330,300 L300,290 L270,310 L240,300 L210,320 L180,310 L150,330 L120,320 L90,340 L60,330 L40,310 L70,290 L100,280 L130,260 L110,240 L80,220 L60,200 L80,180 L110,170 L130,150 L150,120Z' fill='%234caf50' stroke='%232d6a4f' stroke-width='2'/%3E%3Ccircle cx='200' cy='200' r='8' fill='%23ff6b6b'/%3E%3Ccircle cx='550' cy='180' r='8' fill='%23ff6b6b'/%3E%3Ccircle cx='380' cy='260' r='8' fill='%23ff6b6b'/%3E%3Ctext x='180' y='190' font-size='12' fill='white' font-weight='bold'%3E🌎%3C/text%3E%3Ctext x='530' y='170' font-size='12' fill='white'%3E🌍%3C/text%3E%3Ctext x='360' y='250' font-size='12' fill='white'%3E🌏%3C/text%3E%3C/svg%3E";

            // 1) CONSTRUIR OS QUADRADOS NO GRID (3x3)
            const grade = document.getElementById('gradeMaterias');
            if (grade) {
                materias.forEach(materia => {
                    const card = document.createElement('div');
                    card.className = 'card-materia';
                    if (materia.nome === "geografia") {
                        card.classList.add('geografia-card');
                    }
                    card.setAttribute('data-materia', materia.nome.toLowerCase());

                    // Conteúdo do card
                    if (materia.nome === "geografia") {
                        // Card com imagem de mapa
                        const img = document.createElement('img');
                        img.src = mapaImagemUrl;
                        img.alt = "Mapa colorido";
                        img.className = "mapa-imagem";
                        
                        const texto = document.createElement('span');
                        texto.className = "materia-texto";
                        texto.textContent = "geografia";
                        
                        card.appendChild(img);
                        card.appendChild(texto);
                    } else {
                        // Card normal apenas com texto
                        card.textContent = materia.nome;
                    }

                    // ao clicar no card → abre nova página com os conteúdos da matéria
                    card.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const materiaNome = materia.nome;
                        const novaJanela = window.open('', '_blank');
                        if (novaJanela) {
                            novaJanela.document.write(`
                                <!DOCTYPE html>
                                <html lang="pt">
                                <head>
                                    <meta charset="UTF-8">
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <title>${materiaNome} · conteúdos</title>
                                    <style>
                                        body { font-family: system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
                                        .card { background: white; max-width: 700px; margin: 0 auto; border-radius: 0; padding: 2rem; box-shadow: 0 20px 30px -12px #00000020; }
                                        h1 { border-bottom: 3px solid #3b82f6; padding-bottom: 0.5rem; color: #0f172a; }
                                        ul { margin-top: 2rem; list-style: none; padding: 0; }
                                        li { background: #f8fafc; margin: 0.7rem 0; padding: 0.8rem 1.2rem; border-radius: 0; font-size: 1.2rem; border: 1px solid #cbd5e1; }
                                        .voltar { display: inline-block; margin-top: 2rem; padding: 0.5rem 1.8rem; background: #1e293b; color: white; border-radius: 0; text-decoration: none; }
                                    </style>
                                </head>
                                <body>
                                    <div class="card">
                                        <h1>📘 ${materiaNome}</h1>
                                        <p><strong>Conteúdos disponíveis:</strong></p>
                                        <ul>
                                            <li>📌 Introdução à ${materiaNome}</li>
                                            <li>📌 Conceitos fundamentais</li>
                                            <li>📌 Exercícios resolvidos</li>
                                            <li>📌 Material de apoio (PDF)</li>
                                            <li>📌 Videoaulas recomendadas</li>
                                        </ul>
                                        <a href="#" onclick="window.close()" class="voltar">⏎ fechar</a>
                                    </div>
                                    <script>document.title = '${materiaNome} — conteúdos';<\\/script>
                                </body>
                                </html>
                            `);
                            novaJanela.document.close();
                        } else {
                            alert('Permita pop-ups para ver a página da matéria.');
                        }
                    });

                    grade.appendChild(card);
                    cards.push(card);
                });
            }

            // 2) FUNÇÃO PARA MOSTRAR TODAS AS MATÉRIAS (desativar modo imagem)
            function mostrarTodasMaterias() {
                modoImagemAtivo = false;
                // Remove a classe que esconde os cards e a faixa preta
                document.body.classList.remove('modo-imagem');
                // Garante que todos os cards estejam visíveis
                cards.forEach(card => {
                    card.classList.remove('hidden');
                });
                
                // Remove mensagem de "nenhum resultado" se existir
                const mensagemExistente = grade.querySelector('.nenhum-resultado');
                if (mensagemExistente) {
                    mensagemExistente.remove();
                }
            }
            
            // 3) FUNÇÃO PARA DEIXAR APENAS AS MATÉRIAS E FAIXA PRETA EM BRANCO
            function materiasEFaixaEmBranco() {
                modoImagemAtivo = true;
                // Adiciona a classe que esconde todos os cards e a faixa preta
                document.body.classList.add('modo-imagem');
                
                // Remove qualquer mensagem de resultado
                const mensagemExistente = grade.querySelector('.nenhum-resultado');
                if (mensagemExistente) {
                    mensagemExistente.remove();
                }
            }
            
            // 4) FUNÇÃO DE PESQUISA
            function pesquisarMateria() {
                // Se o modo imagem estiver ativo, não faz pesquisa
                if (modoImagemAtivo) {
                    return;
                }
                
                const termoPesquisa = document.getElementById('campoPesquisa').value.toLowerCase().trim();
                
                let resultadosEncontrados = 0;
                
                cards.forEach(card => {
                    const nomeMateria = card.getAttribute('data-materia');
                    
                    // Verifica se o termo de pesquisa está contido no nome da matéria
                    if (termoPesquisa === '' || nomeMateria.includes(termoPesquisa)) {
                        card.classList.remove('hidden');
                        resultadosEncontrados++;
                    } else {
                        card.classList.add('hidden');
                    }
                });
                
                // Remove mensagem de "nenhum resultado" se existir
                const mensagemExistente = grade.querySelector('.nenhum-resultado');
                if (mensagemExistente) {
                    mensagemExistente.remove();
                }
                
                // Se não encontrou nenhum resultado, exibe mensagem
                if (resultadosEncontrados === 0 && termoPesquisa !== '') {
                    const mensagem = document.createElement('div');
                    mensagem.className = 'nenhum-resultado';
                    mensagem.textContent = `Nenhuma matéria encontrada para "${termoPesquisa}". Tente novamente!`;
                    grade.appendChild(mensagem);
                }
            }
            
            // 5) FUNÇÃO PARA LIMPAR PESQUISA
            function limparPesquisa() {
                const campoPesquisa = document.getElementById('campoPesquisa');
                campoPesquisa.value = '';
                if (!modoImagemAtivo) {
                    cards.forEach(card => {
                        card.classList.remove('hidden');
                    });
                    const mensagemExistente = grade.querySelector('.nenhum-resultado');
                    if (mensagemExistente) {
                        mensagemExistente.remove();
                    }
                }
            }
            
            // 6) CONFIGURAR EVENTOS DE PESQUISA
            const campoPesquisa = document.getElementById('campoPesquisa');
            const botaoPesquisa = document.getElementById('botaoPesquisa');
            
            // Pesquisar ao digitar no campo (com atraso para melhor experiência)
            let timeoutId;
            campoPesquisa.addEventListener('input', function() {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(pesquisarMateria, 300); // Aguarda 300ms após parar de digitar
            });
            
            // Pesquisar ao clicar na lupa
            botaoPesquisa.addEventListener('click', function() {
                pesquisarMateria();
            });
            
            // Pesquisar ao pressionar Enter no campo de pesquisa
            campoPesquisa.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    pesquisarMateria();
                }
            });
            
            // 7) INTERAÇÃO "TUDO" e "IMAGEM" – ao clicar, adiciona/remove quadrado em volta
            const palavraTudo = document.getElementById('palavraTudo');
            const palavraImagem = document.getElementById('palavraImagem');
            
            // Lógica para "tudo" - mostra todas as matérias e a faixa preta
            palavraTudo.addEventListener('click', function() {
                // Remove o highlight de "imagem" se estiver ativo
                palavraImagem.classList.remove('highlight-palavra');
                // Adiciona highlight em "tudo"
                this.classList.add('highlight-palavra');
                // Mostra todas as matérias e a faixa preta
                mostrarTodasMaterias();
                // Limpa o campo de pesquisa
                limparPesquisa();
            });
            
            // Lógica para "imagem" - deixa apenas as matérias e a faixa preta em branco
            palavraImagem.addEventListener('click', function() {
                // Remove o highlight de "tudo" se estiver ativo
                palavraTudo.classList.remove('highlight-palavra');
                // Adiciona highlight em "imagem"
                this.classList.add('highlight-palavra');
                // Deixa as matérias e a faixa preta em branco
                materiasEFaixaEmBranco();
                // Limpa o campo de pesquisa
                limparPesquisa();
            });
            
            // Estado inicial: "tudo" fica destacado e todas as matérias aparecem
            palavraTudo.classList.add('highlight-palavra');
            mostrarTodasMaterias();
            
        })();
    </script>
</body>
</html>
