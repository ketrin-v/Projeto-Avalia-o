<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudoAtivo · portal de matérias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 2rem 2rem 0 2rem;
        }

        .search-section {
            width: 100%;
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            width: 100%;
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 0;
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            flex-direction: row-reverse;
        }

        .search-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }

        .search-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 0.2rem 0;
            background: transparent;
        }

        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 300;
        }

        .lupa {
            margin-left: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .lupa:hover {
            opacity: 0.7;
        }

        .lupa-svg {
            width: 22px;
            height: 22px;
            border: 2.5px solid currentColor;
            border-radius: 50%;
            position: relative;
            background: transparent;
        }

        .lupa-svg::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: -7px;
            width: 8px;
            height: 2.5px;
            background-color: currentColor;
            transform: rotate(45deg);
            border-radius: 1px;
        }

        .tudo-linha {
            margin: 1.2rem 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .palavra-interativa {
            display: inline-block;
            cursor: pointer;
            color: #0f172a;
            transition: all 0.1s ease;
            user-select: none;
            padding: 0 0.2rem;
        }

        .highlight-palavra {
            outline: 3px solid #2563eb;
            outline-offset: 4px;
            background-color: #eff6ff;
            border-radius: 0;
        }

        .materias-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2.5rem 0 0 0;
            width: 100%;
        }

        .card-materia {
            background-color: white;
            border-radius: 0;
            padding: 3rem 0.5rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            word-break: break-word;
            line-height: 1.3;
            gap: 0.8rem;
        }

        .card-materia.geografia-card {
            padding: 1rem 0.5rem;
            background: linear-gradient(145deg, #f5fafd 0%, #eef3f8 100%);
        }

        .globo-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 800px;
        }

        .globo-3d {
            width: 85%;
            max-width: 180px;
            height: auto;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.3));
            animation: flutuar 3s ease-in-out infinite;
        }

        .card-materia.geografia-card:hover .globo-3d {
            transform: scale(1.08) rotate(5deg);
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .materia-texto {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-top: 0.5rem;
        }

        .card-materia:hover {
            transform: scale(1.02);
            border-color: #94a3b8;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.15);
        }

        .card-materia:active {
            transform: scale(0.98);
        }

        .card-materia.hidden {
            display: none;
        }

        .modo-imagem .card-materia {
            display: none;
        }

        .modo-imagem .faixa-preta-full {
            display: none;
        }

        .nenhum-resultado {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #64748b;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            grid-column: 1 / -1;
            margin: 2rem 0;
        }

        .espacador-1cm {
            height: 37.8px;
            width: 100%;
            background-color: transparent;
        }

        .faixa-preta-full {
            width: 100%;
            background-color: #0a0a0a;
            height: 189px;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .apos-faixa {
            width: 100%;
            height: 1rem;
            background-color: transparent;
        }

        @media (max-width: 768px) {
            .materias-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .globo-3d {
                width: 75%;
            }
        }

        @media (max-width: 480px) {
            .materias-grid {
                grid-template-columns: 1fr;
            }
            .globo-3d {
                width: 65%;
            }
        }
    </style>
</head>
<body>

                                        h1 { border-bottom: 3px solid #3b82f6; padding-bottom: 0.5rem; color: #0f172a; }
                                        ul { margin-top: 2rem; list-style: none; padding: 0; }
                                        li { background: #f8fafc; margin: 0.7rem 0; padding: 0.8rem 1.2rem; border-radius: 0; font-size: 1.2rem; border: 1px solid #cbd5e1; }
                                        .voltar { display: inline-block; margin-top: 2rem; padding: 0.5rem 1.8rem; background: #1e293b; color: white; border-radius: 0; text-decoration: none; }
                                    </style>
                                </head>
                                <body>
                                    <div class="card">
                                        <h1>📘 ${materiaNome}</h1>
                                        <p><strong>Conteúdos disponíveis:</strong></p>
                                        <ul>
                                            <li>📌 Introdução à ${materiaNome}</li>
                                            <li>📌 Conceitos fundamentais</li>
                                            <li>📌 Exercícios resolvidos</li>
                                            <li>📌 Material de apoio (PDF)</li>
                                            <li>📌 Videoaulas recomendadas</li>
                                        </ul>
                                        <a href="#" onclick="window.close()" class="voltar">⏎ fechar</a>
                                    </div>
                                    <script>document.title = '${materiaNome} — conteúdos';<\\/script>
                                </body>
                                </html>
                            `);
                            novaJanela.document.close();
                        } else {
                            alert('Permita pop-ups para ver a página da matéria.');
                        }
                    });

                    grade.appendChild(card);
                    cards.push(card);
                });
            }

            function mostrarTodasMaterias() {
                modoImagemAtivo = false;
                document.body.classList.remove('modo-imagem');
                cards.forEach(card => card.classList.remove('hidden'));
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
            }
            
            function materiasEFaixaEmBranco() {
                modoImagemAtivo = true;
                document.body.classList.add('modo-imagem');
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
            }
            
            function pesquisarMateria() {
                if (modoImagemAtivo) return;
                const termo = document.getElementById('campoPesquisa').value.toLowerCase().trim();
                let encontrados = 0;
                cards.forEach(card => {
                    const nome = card.getAttribute('data-materia');
                    if (termo === '' || nome.includes(termo)) {
                        card.classList.remove('hidden');
                        encontrados++;
                    } else {
                        card.classList.add('hidden');
                    }
                });
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
                if (encontrados === 0 && termo !== '') {
                    const mensagem = document.createElement('div');
                    mensagem.className = 'nenhum-resultado';
                    mensagem.textContent = `Nenhuma matéria encontrada para "${termo}". Tente novamente!`;
                    grade.appendChild(mensagem);
                }
            }
            
            function limparPesquisa() {
                const campo = document.getElementById('campoPesquisa');
                campo.value = '';
                if (!modoImagemAtivo) {
                    cards.forEach(card => card.classList.remove('hidden'));
                    const msg = grade.querySelector('.nenhum-resultado');
                    if (msg) msg.remove();
                }
            }
            
            const campoPesquisa = document.getElementById('campoPesquisa');
            const botaoPesquisa = document.getElementById('botaoPesquisa');
            let timeoutId;
            campoPesquisa.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(pesquisarMateria, 300);
            });
            botaoPesquisa.addEventListener('click', () => pesquisarMateria());
            campoPesquisa.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); pesquisarMateria(); }
            });
            
            const palavraTudo = document.getElementById('palavraTudo');
            const palavraImagem = document.getElementById('palavraImagem');
            
            palavraTudo.addEventListener('click', () => {
                palavraImagem.classList.remove('highlight-palavra');
                palavraTudo.classList.add('highlight-palavra');
                mostrarTodasMaterias();
                limparPesquisa();
            });
            
            palavraImagem.addEventListener('click', () => {
                palavraTudo.classList.remove('highlight-palavra');
                palavraImagem.classList.add('highlight-palavra');
                materiasEFaixaEmBranco();
                limparPesquisa();
            });
            
            palavraTudo.classList.add('highlight-palavra');
            mostrarTodasMaterias();
        })();
    </script>
</body>
</html>
