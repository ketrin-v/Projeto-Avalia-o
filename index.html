<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudoAtivo · portal de matérias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background-color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 100%;
            padding: 2rem 2rem 0 2rem;
        }

        .search-section {
            width: 100%;
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            width: 100%;
            background-color: white;
            border: 2px solid #cbd5e1;
            border-radius: 0;
            display: flex;
            align-items: center;
            padding: 0.8rem 1.2rem;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            flex-direction: row-reverse;
        }

        .search-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59,130,246,0.15);
        }

        .search-wrapper input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.1rem;
            padding: 0.2rem 0;
            background: transparent;
        }

        .search-wrapper input::placeholder {
            color: #94a3b8;
            font-weight: 300;
        }

        .lupa {
            margin-left: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .lupa:hover {
            opacity: 0.7;
        }

        .lupa-svg {
            width: 22px;
            height: 22px;
            border: 2.5px solid currentColor;
            border-radius: 50%;
            position: relative;
            background: transparent;
        }

        .lupa-svg::after {
            content: '';
            position: absolute;
            bottom: -6px;
            right: -7px;
            width: 8px;
            height: 2.5px;
            background-color: currentColor;
            transform: rotate(45deg);
            border-radius: 1px;
        }

        .tudo-linha {
            margin: 1.2rem 0 0.5rem 0;
            font-size: 2rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .palavra-interativa {
            display: inline-block;
            cursor: pointer;
            color: #0f172a;
            transition: all 0.1s ease;
            user-select: none;
            padding: 0 0.2rem;
        }

        .highlight-palavra {
            outline: 3px solid #2563eb;
            outline-offset: 4px;
            background-color: #eff6ff;
            border-radius: 0;
        }

        .materias-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin: 2.5rem 0 0 0;
            width: 100%;
        }

        .card-materia {
            background-color: white;
            border-radius: 0;
            padding: 3rem 0.5rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            box-shadow: 0 10px 20px -8px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.15s, box-shadow 0.2s, border-color 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            word-break: break-word;
            line-height: 1.3;
            gap: 0.8rem;
        }

        /* Estilo para cards com imagem */
        .card-materia.com-imagem {
            padding: 1rem 0.5rem;
        }

        .card-materia.geografia-card {
            background: linear-gradient(145deg, #f5fafd 0%, #eef3f8 100%);
        }

        .card-materia.historia-card {
            background: linear-gradient(145deg, #fef7e8 0%, #faf0e0 100%);
        }

        .imagem-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .imagem-materia {
            width: 85%;
            max-width: 180px;
            height: auto;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.2));
            animation: flutuar 3s ease-in-out infinite;
        }

        .card-materia.com-imagem:hover .imagem-materia {
            transform: scale(1.08) rotate(3deg);
            filter: drop-shadow(0 12px 25px rgba(0,0,0,0.3));
        }

        /* Animação de flutuação apenas para geografia */
        .geografia-card .imagem-materia {
            animation: flutuar 3s ease-in-out infinite;
        }

        /* Animação diferente para história */
        .historia-card .imagem-materia {
            animation: flutuarHistoria 3.5s ease-in-out infinite;
        }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        @keyframes flutuarHistoria {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-4px) rotate(1deg); }
        }

        .materia-texto {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            margin-top: 0.5rem;
        }

        .card-materia:hover {
            transform: scale(1.02);
            border-color: #94a3b8;
            box-shadow: 0 20px 25px -10px rgba(0,0,0,0.15);
        }

        .card-materia:active {
            transform: scale(0.98);
        }

        .card-materia.hidden {
            display: none;
        }

        .modo-imagem .card-materia {
            display: none;
        }

        .modo-imagem .faixa-preta-full {
            display: none;
        }

        .nenhum-resultado {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #64748b;
            background-color: #f1f5f9;
            border: 1px solid #cbd5e1;
            grid-column: 1 / -1;
            margin: 2rem 0;
        }

        .espacador-1cm {
            height: 37.8px;
            width: 100%;
            background-color: transparent;
        }

        .faixa-preta-full {
            width: 100%;
            background-color: #0a0a0a;
            height: 189px;
            margin: 0;
            padding: 0;
        }

        body {
            width: 100%;
            margin: 0;
            padding: 0;
        }

        .apos-faixa {
            width: 100%;
            height: 1rem;
            background-color: transparent;
        }

        @media (max-width: 768px) {
            .materias-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .imagem-materia {
                width: 75%;
            }
        }

        @media (max-width: 480px) {
            .materias-grid {
                grid-template-columns: 1fr;
            }
            .imagem-materia {
                width: 65%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-section">
            <div class="search-wrapper">
                <span class="lupa" aria-hidden="true" id="botaoPesquisa">
                    <span class="lupa-svg"></span>
                </span>
                <input type="text" id="campoPesquisa" placeholder="Pesquisar matéria ou conteúdo..." aria-label="Campo de pesquisa">
            </div>
        </div>

        <div class="tudo-linha">
            <span class="palavra-interativa" id="palavraTudo">tudo</span>
            <span class="palavra-interativa" id="palavraImagem">imagem</span>
        </div>

        <div class="materias-grid" id="gradeMaterias"></div>

        <div class="espacador-1cm"></div>
    </div>

    <div class="faixa-preta-full">
        <div class="faixa-preta"></div>
    </div>

    <div class="apos-faixa"></div>

    <script>
        (function() {
            const materias = [
                { nome: "geografia", temImagem: true, tipo: "geografia" },
                { nome: "história", temImagem: true, tipo: "historia" },
                { nome: "arte", temImagem: false },
                { nome: "matemática", temImagem: false },
                { nome: "língua inglesa", temImagem: false },
                { nome: "educação física", temImagem: false },
                { nome: "biologia", temImagem: false },
                { nome: "química", temImagem: false },
                { nome: "língua portuguesa", temImagem: false }
            ];

            let cards = [];
            let modoImagemAtivo = false;

            // GLOBO TERRESTRE PREMIUM
            const globoPremiumUrl = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 540 540'%3E
                %3Cdefs%3E
                    %3CradialGradient id='oceanGrad' cx='40%25' cy='35%25' r='65%25'%3E
                        %3Cstop offset='0%25' stop-color='%234aa5df'/%3E

                        %3Cstop offset='100%25' stop-color='%23154466'/%3E
                    %3C/radialGradient%3E
                    %3CradialGradient id='gloss' cx='30%25' cy='30%25' r='50%25'%3E
                        %3Cstop offset='0%25' stop-color='%23ffffff' stop-opacity='0.7'/%3E
                        %3Cstop offset='60%25' stop-color='%23ffffff' stop-opacity='0.2'/%3E
                        %3Cstop offset='100%25' stop-color='%23ffffff' stop-opacity='0'/%3E
                    %3C/radialGradient%3E
                    %3ClinearGradient id='forestGrad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E
                        %3Cstop offset='0%25' stop-color='%233d8c40'/%3E
                        %3Cstop offset='50%25' stop-color='%2355b34c'/%3E
                        %3Cstop offset='100%25' stop-color='%233d8c40'/%3E
                    %3C/linearGradient%3E
                %3C/defs%3E
                %3Ccircle cx='270' cy='270' r='255' fill='url(%23oceanGrad)' stroke='%232a5a7a' stroke-width='2.5'/%3E
                %3Ccircle cx='270' cy='270' r='252' fill='url(%23oceanGrad)'/%3E
                %3Cpath d='M135,160 L162,142 L190,148 L212,165 L226,188 L222,215 L204,238 L178,248 L150,242 L130,224 L118,198 L122,170 L135,160Z' fill='url(%23forestGrad)' stroke='%2320643a' stroke-width='1.5'/%3E
                %3Cpath d='M145,300 L168,288 L192,296 L210,312 L215,340 L198,362 L172,370 L148,360 L130,338 L125,315 L135,300 L145,300Z' fill='%234fa845' stroke='%2320643a' stroke-width='1.5'/%3E
                %3Cpath d='M385,128 L410,120 L435,128 L455,148 L468,175 L458,200 L438,215 L412,218 L388,208 L368,188 L360,162 L370,138 L385,128Z' fill='%2366bb54' stroke='%2320643a' stroke-width='1.5'/%3E
                %3Cpath d='M435,160 L462,150 L490,160 L512,182 L526,212 L514,238 L490,252 L465,252 L440,240 L420,218 L412,192 L425,168 L435,160Z' fill='%2365b84a' stroke='%2320643a' stroke-width='1.5'/%3E
                %3Cpath d='M320,198 L348,190 L372,200 L392,222 L387,250 L368,270 L342,272 L318,260 L300,236 L298,210 L310,198 L320,198Z' fill='%2374b95c' stroke='%2320643a' stroke-width='1.5'/%3E
                %3Ccircle cx='200' cy='190' r='80' fill='url(%23gloss)'/%3E
                %3Ccircle cx='48' cy='62' r='2.5' fill='white' opacity='0.95'/%3E
                %3Ccircle cx='85' cy='38' r='2' fill='white' opacity='0.9'/%3E
                %3Ccircle cx='415' cy='48' r='2.5' fill='white' opacity='0.95'/%3E
            %3C/svg%3E`;

            // IMAGEM PARA HISTÓRIA - Papiro antigo com pergaminho e elementos históricos
            const imagemHistoriaUrl = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'%3E
                %3Cdefs%3E
                    %3ClinearGradient id='papyrus' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E
                        %3Cstop offset='0%25' stop-color='%23f7e5c2'/%3E
                        %3Cstop offset='50%25' stop-color='%23eed8b0'/%3E
                        %3Cstop offset='100%25' stop-color='%23e5ca96'/%3E
                    %3C/linearGradient%3E
                    %3Cfilter id='shadow' x='-20%25' y='-20%25' width='140%25' height='140%25'%3E
                        %3CfeGaussianBlur in='SourceAlpha' stdDeviation='3'/%3E
                        %3CfeOffset dx='3' dy='4'/%3E
                        %3CfeMerge%3E%3CfeMergeNode/%3E%3CfeMergeNode in='SourceGraphic'/%3E%3C/feMerge%3E
                    %3C/filter%3E
                %3C/defs%3E
                %3C!-- Fundo de pergaminho antigo --%3E
                %3Crect x='30' y='30' width='340' height='340' fill='url(%23papyrus)' rx='15' ry='15' filter='url(%23shadow)'/%3E
                %3C!-- Textura de papel antigo (manchas) --%3E
                %3Ccircle cx='80' cy='90' r='25' fill='%23d4b87a' opacity='0.3'/%3E
                %3Ccircle cx='310' cy='280' r='35' fill='%23c4a86a' opacity='0.25'/%3E
                %3Ccircle cx='220' cy='350' r='20' fill='%23b89858' opacity='0.3'/%3E
                %3Ccircle cx='120' cy='320' r='18' fill='%23c4a86a' opacity='0.25'/%3E
                %3C!-- Rolo de pergaminho na parte superior --%3E
                %3Crect x='150' y='45' width='100' height='25' fill='%23c9aa74' rx='8'/%3E
                %3Crect x='140' y='48' width='120' height='8' fill='%23b8894a' rx='3'/%3E
                %3C!-- Símbolos históricos --%3E
                %3C!-- Pirâmide do Egito --%3E
                %3Cpolygon points='100,200 150,120 200,200' fill='%23cdb38c' stroke='%238b6942' stroke-width='2'/%3E
                %3Crect x='125' y='200' width='50' height='40' fill='%23b58f5a'/%3E
                %3C!-- Coluna grega --%3E
                %3Crect x='270' y='160' width='18' height='100' fill='%23bc9a6c'/%3E
                %3Ccircle cx='279' cy='155' r='12' fill='%23d4b67c'/%3E
                %3Crect x='255' y='260' width='48' height='12' fill='%23ac8454'/%3E
                %3C!-- Livro antigo aberto --%3E
                %3Crect x='55' y='260' width='70' height='70' fill='%238b6942' rx='5'/%3E
                %3Crect x='60' y='265' width='60' height='60' fill='%23f0e0b0' rx='3'/%3E
                %3Cpath d='M90,270 L90,320' stroke='%238b6942' stroke-width='2'/%3E
                %3Cpath d='M80,285 L100,285' stroke='%238b6942' stroke-width='1.5'/%3E
                %3Cpath d='M80,300 L100,300' stroke='%238b6942' stroke-width='1.5'/%3E
                %3C!-- Ânfora grega --%3E
                %3Cpath d='M310,320 L320,270 L330,320 Z' fill='%23c9aa74' stroke='%238b6942' stroke-width='1.5'/%3E
                %3Ccircle cx='320' cy='265' r='12' fill='%23b88d4a'/%3E
                %3C!-- Coroa medieval --%3E
                %3Cpolygon points='240,85 255,70 270,85 265,100 245,100' fill='%23e5c878' stroke='%23b87c3a' stroke-width='1.5'/%3E
                %3Ccircle cx='255' cy='88' r='4' fill='%23ff4d4d'/%3E
                %3Ccircle cx='245' cy='92' r='3' fill='%23ff6b6b'/%3E
                %3Ccircle cx='265' cy='92' r='3' fill='%23ff6b6b'/%3E
                %3C!-- Pena de escrever antiga --%3E
                %3Cpath d='M180,70 L190,65 L188,78 L180,85 Z' fill='%236b4a2a'/%3E
                %3Cpath d='M183,72 L193,67 L191,76 Z' fill='%238b623a'/%3E
                %3C!-- Textos decorativos em grego antigo --%3E
                %3Ctext x='170' y='210' font-size='14' fill='%238b6942' font-family='monospace'%3EΑΘΗΝΑ%3C/text%3E
                %3Ctext x='280' y='125' font-size='12' fill='%238b6942'%3EROMA%3C/text%3E
                %3Ctext x='70' y='235' font-size='11' fill='%238b6942'%3E𓂀%3C/text%3E
                %3Ctext x='340' y='195' font-size='12' fill='%238b6942'%3E⚱️%3C/text%3E
                %3Ctext x='190' y='370' font-size='10' fill='%238b6942' font-style='italic'%3EHISTORIA%3C/text%3E
                %3C!-- Linhas de texto simulando escrita antiga --%3E
                %3Cpath d='M185,295 L270,295' stroke='%238b6942' stroke-width='1' stroke-dasharray='4,3'/%3E
                %3Cpath d='M185,310 L255,310' stroke='%238b6942' stroke-width='1' stroke-dasharray='4,3'/%3E
                %3Cpath d='M185,325 L240,325' stroke='%238b6942' stroke-width='1' stroke-dasharray='4,3'/%3E
                %3C!-- Efeito de envelhecimento nas bordas --%3E
                %3Cpath d='M30,30 L60,35 L55,55 L35,60 Z' fill='%23b88d5a' opacity='0.4'/%3E
                %3Cpath d='M370,30 L340,35 L345,55 L365,60 Z' fill='%23b88d5a' opacity='0.4'/%3E
                %3Cpath d='M30,370 L60,365 L55,345 L35,340 Z' fill='%23b88d5a' opacity='0.4'/%3E
                %3Cpath d='M370,370 L340,365 L345,345 L365,340 Z' fill='%23b88d5a' opacity='0.4'/%3E
            %3C/svg%3E`;

            const grade = document.getElementById('gradeMaterias');
            if (grade) {
                materias.forEach(materia => {
                    const card = document.createElement('div');
                    card.className = 'card-materia';
                    
                    if (materia.temImagem) {
                        card.classList.add('com-imagem');
                        if (materia.tipo === "geografia") {
                            card.classList.add('geografia-card');
                        } else if (materia.tipo === "historia") {
                            card.classList.add('historia-card');
                        }
                    }
                    
                    card.setAttribute('data-materia', materia.nome.toLowerCase());

                    if (materia.temImagem) {
                        const container = document.createElement('div');
                        container.className = 'imagem-container';
                        
                        const img = document.createElement('img');
                        if (materia.tipo === "geografia") {
                            img.src = globoPremiumUrl;
                            img.alt = "Globo terrestre";
                        } else if (materia.tipo === "historia") {
                            img.src = imagemHistoriaUrl;
                            img.alt = "Pergaminho histórico";
                        }
                        img.className = "imagem-materia";
                        
                        const texto = document.createElement('span');
                        texto.className = "materia-texto";
                        texto.textContent = materia.nome;
                        
                        container.appendChild(img);
                        card.appendChild(container);
                        card.appendChild(texto);
                    } else {
                        card.textContent = materia.nome;
                    }

                    card.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const materiaNome = materia.nome;
                        const novaJanela = window.open('', '_blank');
                        if (novaJanela) {
                            novaJanela.document.write(`
                                <!DOCTYPE html>
                                <html lang="pt">
                                <head>
                                    <meta charset="UTF-8">
                                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                                    <title>${materiaNome} · conteúdos</title>
                                    <style>
                                        body { font-family: system-ui, sans-serif; background: #f1f5f9; margin: 0; padding: 2rem; }
                                        .card { background: white; max-width: 700px; margin: 0 auto; border-radius: 0; padding: 2rem; box-shadow: 0 20px 30px -12px #00000020; }
                                        h1 { border-bottom: 3px solid #3b82f6; padding-bottom: 0.5rem; color: #0f172a; }
                                        ul { margin-top: 2rem; list-style: none; padding: 0; }
                                        li { background: #f8fafc; margin: 0.7rem 0; padding: 0.8rem 1.2rem; border-radius: 0; font-size: 1.2rem; border: 1px solid #cbd5e1; }
                                        .voltar { display: inline-block; margin-top: 2rem; padding: 0.5rem 1.8rem; background: #1e293b; color: white; border-radius: 0; text-decoration: none; }
                                    </style>
                                </head>
                                <body>
                                    <div class="card">
                                        <h1>📘 ${materiaNome}</h1>
                                        <p><strong>Conteúdos disponíveis:</strong></p>
                                        <ul>
                                            <li>📌 Introdução à ${materiaNome}</li>
                                            <li>📌 Conceitos fundamentais</li>
                                            <li>📌 Exercícios resolvidos</li>
                                            <li>📌 Material de apoio (PDF)</li>
                                            <li>📌 Videoaulas recomendadas</li>
                                        </ul>
                                        <a href="#" onclick="window.close()" class="voltar">⏎ fechar</a>
                                    </div>
                                    <script>document.title = '${materiaNome} — conteúdos';<\\/script>
                                </body>
                                </html>
                            `);
                            novaJanela.document.close();
                        } else {
                            alert('Permita pop-ups para ver a página da matéria.');
                        }
                    });

                    grade.appendChild(card);
                    cards.push(card);
                });
            }

            function mostrarTodasMaterias() {
                modoImagemAtivo = false;
                document.body.classList.remove('modo-imagem');
                cards.forEach(card => card.classList.remove('hidden'));
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
            }
            
            function materiasEFaixaEmBranco() {
                modoImagemAtivo = true;
                document.body.classList.add('modo-imagem');
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
            }
            
            function pesquisarMateria() {
                if (modoImagemAtivo) return;
                const termo = document.getElementById('campoPesquisa').value.toLowerCase().trim();
                let encontrados = 0;
                cards.forEach(card => {
                    const nome = card.getAttribute('data-materia');
                    if (termo === '' || nome.includes(termo)) {
                        card.classList.remove('hidden');
                        encontrados++;
                    } else {
                        card.classList.add('hidden');
                    }
                });
                const msg = grade.querySelector('.nenhum-resultado');
                if (msg) msg.remove();
                if (encontrados === 0 && termo !== '') {
                    const mensagem = document.createElement('div');
                    mensagem.className = 'nenhum-resultado';
                    mensagem.textContent = `Nenhuma matéria encontrada para "${termo}". Tente novamente!`;
                    grade.appendChild(mensagem);
                }
            }
            
            function limparPesquisa() {
                const campo = document.getElementById('campoPesquisa');
                campo.value = '';
                if (!modoImagemAtivo) {
                    cards.forEach(card => card.classList.remove('hidden'));
                    const msg = grade.querySelector('.nenhum-resultado');
                    if (msg) msg.remove();
                }
            }
            
            const campoPesquisa = document.getElementById('campoPesquisa');
            const botaoPesquisa = document.getElementById('botaoPesquisa');
            let timeoutId;
            campoPesquisa.addEventListener('input', () => {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(pesquisarMateria, 300);
            });
            botaoPesquisa.addEventListener('click', () => pesquisarMateria());
            campoPesquisa.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); pesquisarMateria(); }
            });
            
            const palavraTudo = document.getElementById('palavraTudo');
            const palavraImagem = document.getElementById('palavraImagem');
            
            palavraTudo.addEventListener('click', () => {
                palavraImagem.classList.remove('highlight-palavra');
                palavraTudo.classList.add('highlight-palavra');
                mostrarTodasMaterias();
                limparPesquisa();
            });
            
            palavraImagem.addEventListener('click', () => {
                palavraTudo.classList.remove('highlight-palavra');
                palavraImagem.classList.add('highlight-palavra');
                materiasEFaixaEmBranco();
                limparPesquisa();
            });
            
            palavraTudo.classList.add('highlight-palavra');
            mostrarTodasMaterias();
        })();
    </script>
</body>
</html>
